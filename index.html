<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chords Randomizer</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <p class="title">Chord Randomizer</p>
    <div class="box">   
      <button class="generateButton" onclick="Randomization()">Random Chords</button>
      <div class="checkboxes">
        <p class="text">9</p>
        <input type="checkbox" class="checkbox9">
      </div>
      <div class="checkboxes">
        <p class="text">11</p>
        <input type="checkbox" class="checkbox11">
      </div>
      <div class="checkboxes">
        <p class="text">13</p>
        <input type="checkbox" class="checkbox13">
      </div>
       min="60" max="240">
      <p class="tempovalue text"></p>
    </div>
    <div class="box">
      <p class="text">Tempo</p>
      <input class="slider" type="range" value="0"
    </div>
    <div class="box">
      <p class="chord"></p>
      <p class="nextchord"></p>
    </div>
  </body>
  <script src="script.js"></script>
</html>
